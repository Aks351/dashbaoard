<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vinayak Enterprises · KPI Dashboard · June 2026</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #f0f2f7;
      --surface: #ffffff;
      --border: #dde3ee;
      --navy: #1a2744;
      --navy2: #243260;
      --gold: #c8960a;
      --red: #dc2626;
      --green: #16a34a;
      --amber: #d97706;
      --blue: #1d4ed8;
      --text: #1e293b;
      --text2: #475569;
      --muted: #94a3b8;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh
    }

    /* ── NAV ── */
    nav {
      background: var(--navy);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 60px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, .18);
      position: sticky;
      top: 0;
      z-index: 200
    }

    .nav-logo {
      height: 38px;
      width: auto;
      filter: brightness(0) invert(1)
    }

    .nav-tabs {
      display: flex;
      gap: 2px;
      flex-wrap: wrap
    }

    .tab {
      padding: 7px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: transparent;
      color: rgba(255, 255, 255, .55);
      transition: all .2s;
      letter-spacing: .1px;
      font-family: 'Inter', sans-serif
    }

    .tab:hover {
      color: #fff;
      background: rgba(255, 255, 255, .1)
    }

    .tab.active {
      background: #fff;
      color: var(--navy);
      font-weight: 700
    }

    .nav-right {
      font-size: 11px;
      color: rgba(255, 255, 255, .45);
      white-space: nowrap;
      text-align: right;
      line-height: 1.6
    }

    /* ── PAGES ── */
    .page {
      display: none;
      padding: 28px 32px 100px;
      animation: fadeIn .22s ease
    }

    .page.active {
      display: block
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(4px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    /* ── PAGE HEADER ── */
    .page-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 22px;
      flex-wrap: wrap;
      gap: 12px
    }

    .page-head h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--navy);
      letter-spacing: -.3px
    }

    .page-head p {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px
    }

    .solution-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: linear-gradient(135deg, #1a56db, #1e429f);
      color: #fff;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 2px 8px rgba(26, 86, 219, .35);
      transition: all .2s;
      white-space: nowrap;
      border: 1.5px solid rgba(255, 255, 255, .15);
      letter-spacing: .2px
    }

    .solution-link:hover {
      background: linear-gradient(135deg, #1e429f, #1a2744);
      box-shadow: 0 4px 14px rgba(26, 86, 219, .45);
      transform: translateY(-1px)
    }

    .solution-link::before {
      content: '📄';
      font-size: 15px
    }

    .solution-link::after {
      content: '↗';
      font-size: 13px;
      opacity: .7;
      margin-left: 2px
    }

    /* ── WEEK TOGGLE ── */
    .week-toggle {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
      flex-wrap: wrap
    }

    .wtab {
      padding: 7px 16px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      transition: all .2s;
      font-family: 'Inter', sans-serif
    }

    .wtab.active {
      border-color: var(--navy);
      color: var(--navy);
      background: #eef2ff;
      font-weight: 700
    }

    /* ── HERO CARDS ── */
    .hero-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 24px
    }

    .hero-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
      border-top: 3px solid transparent;
      box-shadow: 0 1px 3px rgba(0, 0, 0, .05)
    }

    .hero-card.danger {
      border-top-color: var(--red)
    }

    .hero-card.warning {
      border-top-color: var(--amber)
    }

    .hero-card.good {
      border-top-color: var(--green)
    }

    .hero-dept {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--muted);
      margin-bottom: 5px;
      font-weight: 600
    }

    .hero-label {
      font-size: 11px;
      color: var(--text2);
      margin-bottom: 7px
    }

    .hero-val {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 26px;
      font-weight: 700;
      line-height: 1
    }

    .hero-val.red {
      color: var(--red)
    }

    .hero-val.amber {
      color: var(--amber)
    }

    .hero-val.green {
      color: var(--green)
    }

    .hero-plan {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      margin-top: 7px
    }

    .hero-badge.red {
      background: #fee2e2;
      color: var(--red)
    }

    .hero-badge.amber {
      background: #fef3c7;
      color: var(--amber)
    }

    .hero-badge.green {
      background: #dcfce7;
      color: var(--green)
    }

    /* ── SECTION LABEL ── */
    .section-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--navy);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 6px
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border)
    }

    /* ── TABLE BASE ── */
    .metric-table {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 24px;
      box-shadow: 0 1px 3px rgba(0, 0, 0, .04)
    }

    .metric-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text)
    }

    .metric-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px
    }

    .val-actual {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      font-weight: 700
    }

    .val-actual.red {
      color: var(--red)
    }

    .val-actual.amber {
      color: var(--amber)
    }

    .val-actual.green {
      color: var(--green)
    }

    .score-pill {
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      white-space: nowrap
    }

    .score-pill.red {
      background: #fee2e2;
      color: var(--red)
    }

    .score-pill.amber {
      background: #fef3c7;
      color: var(--amber)
    }

    .score-pill.green {
      background: #dcfce7;
      color: var(--green)
    }

    .score-pill.muted {
      background: #f1f5f9;
      color: var(--muted)
    }

    .dept-sep {
      background: #f1f5f9
    }

    .dept-sep-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: var(--navy);
      padding: 7px 14px;
      display: block
    }

    .plan-num {
      font-size: 13px;
      font-weight: 700;
      color: var(--text2)
    }

    .unit-sm {
      font-size: 9px;
      color: var(--muted)
    }

    /* ── OVERVIEW TABLE (dynamic columns) ── */
    .ov-row {
      display: grid;
      border-bottom: 1px solid var(--border)
    }

    .ov-row:last-child {
      border-bottom: none
    }

    .ov-row:hover:not(.head-row):not(.dept-sep) {
      background: #f8fafc
    }

    .head-row {
      background: #f1f5f9
    }

    .ov-cell {
      padding: 10px 12px;
      font-size: 12px;
      display: flex;
      align-items: center
    }

    .ov-cell.head {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--muted);
      font-weight: 700;
      padding: 8px 12px
    }

    .ov-cell.center {
      justify-content: center;
      text-align: center;
      flex-direction: column;
      gap: 1px
    }

    /* ── DEPT TABLE (dynamic columns) ── */
    .dept-tbl {
      display: grid;
      border-bottom: 1px solid var(--border)
    }

    .dept-tbl:last-child {
      border-bottom: none
    }

    .dept-tbl:hover:not(.head-row) {
      background: #f8fafc
    }

    .d-cell {
      padding: 11px 12px;
      font-size: 12px;
      display: flex;
      align-items: center
    }

    .d-cell.head {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--muted);
      font-weight: 700;
      padding: 8px 12px;
      background: #f1f5f9
    }

    .d-cell.center {
      justify-content: center;
      text-align: center;
      flex-direction: column;
      gap: 2px
    }

    .mtd-cell {
      display: flex;
      flex-direction: column;
      gap: 3px;
      align-items: center
    }

    .legend-bar {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
      padding: 7px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      display: inline-flex;
      gap: 16px;
      flex-wrap: wrap
    }

    /* ── DATA ENTRY ── */
    .de-intro {
      background: linear-gradient(135deg, #eef2ff, #f0fdf4);
      border: 1px solid #c7d2fe;
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 18px;
      display: flex;
      align-items: flex-start;
      gap: 12px
    }

    .de-intro-icon {
      font-size: 22px;
      flex-shrink: 0
    }

    .de-intro h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 3px
    }

    .de-intro p {
      font-size: 12px;
      color: var(--text2)
    }

    .week-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 18px;
      align-items: center
    }

    .week-chip {
      padding: 8px 14px;
      border-radius: 7px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      cursor: pointer;
      transition: all .2s;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .week-chip.active {
      border-color: var(--navy);
      background: #eef2ff;
      color: var(--navy)
    }

    .week-chip .x {
      color: var(--muted);
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      padding: 0 2px;
      border-radius: 3px
    }

    .week-chip .x:hover {
      color: var(--red);
      background: #fee2e2
    }

    .btn-addweek {
      padding: 8px 16px;
      border-radius: 7px;
      border: 1.5px dashed #a5b4fc;
      background: #f5f7ff;
      color: var(--navy);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Inter', sans-serif
    }

    .btn-addweek:hover {
      background: #eef2ff;
      border-color: var(--navy)
    }

    .de-dept {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 16px;
      box-shadow: 0 1px 3px rgba(0, 0, 0, .04)
    }

    .de-dept-head {
      background: var(--navy);
      color: #fff;
      padding: 10px 16px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .3px;
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .de-dept-head span {
      font-size: 10px;
      color: rgba(255, 255, 255, .5);
      font-weight: 400
    }

    .de-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      border-bottom: 1px solid var(--border);
      align-items: center
    }

    .de-row:last-child {
      border-bottom: none
    }

    .de-row.head {
      background: #f8fafc
    }

    .de-cell {
      padding: 9px 14px;
      font-size: 12px
    }

    .de-cell.head {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--muted);
      font-weight: 700
    }

    .de-metric-name {
      font-weight: 600;
      color: var(--text);
      font-size: 13px
    }

    .de-metric-ref {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px
    }

    .de-input {
      width: 100%;
      padding: 7px 10px;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--navy);
      background: #f8fafc;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color .2s, background .2s;
      text-align: center
    }

    .de-input:focus {
      border-color: var(--navy);
      background: #fff
    }

    .de-input.filled {
      background: #eef2ff;
      border-color: #a5b4fc
    }

    .de-score {
      text-align: center;
      font-size: 11px;
      font-weight: 700
    }

    .de-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      justify-content: flex-end;
      flex-wrap: wrap
    }

    .btn-primary {
      background: var(--navy);
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 10px 24px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: background .2s
    }

    .btn-primary:hover {
      background: var(--navy2)
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1.5px solid var(--border);
      border-radius: 7px;
      padding: 10px 18px;
      font-size: 12px;
      cursor: pointer;
      font-family: 'Inter', sans-serif
    }

    .btn-ghost:hover {
      color: var(--text);
      border-color: var(--text2)
    }

    .btn-danger {
      background: transparent;
      color: var(--red);
      border: 1.5px solid #fecaca;
      border-radius: 7px;
      padding: 10px 18px;
      font-size: 12px;
      cursor: pointer;
      font-family: 'Inter', sans-serif
    }

    .btn-danger:hover {
      background: #fee2e2
    }

    .save-confirm {
      display: none;
      background: #dcfce7;
      border: 1px solid #86efac;
      border-radius: 7px;
      padding: 10px 16px;
      font-size: 12px;
      color: var(--green);
      font-weight: 600;
      text-align: center;
      margin-top: 12px
    }

    .empty-note {
      padding: 40px;
      text-align: center;
      color: var(--muted);
      font-size: 13px
    }

    /* ── HIRING ADDITIONS ── */
    .rec-wrap {
      margin-top: 6px
    }

    .rec-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px
    }

    @media(max-width:820px) {
      .rec-split {
        grid-template-columns: 1fr
      }
    }

    .rec-table {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 3px rgba(0, 0, 0, .04);
      display: flex;
      flex-direction: column
    }

    .rec-head {
      background: #243260;
      color: #fff;
      padding: 10px 16px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .3px;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .rec-head .sub {
      font-size: 10px;
      color: rgba(255, 255, 255, .55);
      font-weight: 400;
      margin-left: auto
    }

    .pos-group {
      border-top: 1px solid var(--border)
    }

    .pos-title {
      background: #eef2ff;
      padding: 7px 14px;
      font-size: 11px;
      font-weight: 700;
      color: var(--navy);
      text-transform: uppercase;
      letter-spacing: .5px;
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .pos-title .rm {
      color: #94a3b8;
      font-weight: 700;
      cursor: pointer;
      font-size: 13px;
      padding: 0 4px;
      border-radius: 3px
    }

    .pos-title .rm:hover {
      color: #dc2626;
      background: #fee2e2
    }

    .pos-empty {
      padding: 14px;
      font-size: 12px;
      color: #94a3b8;
      text-align: center
    }

    .add-pos {
      margin: 10px 14px 14px;
      padding: 8px 14px;
      border-radius: 7px;
      border: 1.5px dashed #a5b4fc;
      background: #f5f7ff;
      color: #243260;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit
    }

    .add-pos:hover {
      background: #eef2ff;
      border-color: #243260
    }

    .mx-block {
      margin-bottom: 22px
    }

    .mx-rec-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--navy);
      margin: 14px 0 8px;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .mx-scroll {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 1px 3px rgba(0, 0, 0, .04)
    }

    .mx-table {
      border-collapse: collapse;
      width: 100%;
      background: var(--surface);
      font-size: 12px;
      min-width: 480px
    }

    .mx-table th,
    .mx-table td {
      border: 1px solid var(--border);
      padding: 9px 12px;
      text-align: center;
      white-space: nowrap
    }

    .mx-table thead th {
      background: #243260;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .3px
    }

    .mx-table thead th:first-child {
      background: #1a2744;
      text-align: left
    }

    .mx-table tbody th {
      background: #eef2ff;
      color: var(--navy);
      font-weight: 700;
      text-align: left;
      font-size: 12px
    }

    .mx-act {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 14px
    }

    .mx-act.green {
      color: #16a34a
    }

    .mx-act.amber {
      color: #d97706
    }

    .mx-act.red {
      color: #dc2626
    }

    .mx-act.muted {
      color: #94a3b8
    }

    .mx-plan {
      font-size: 10px;
      color: #94a3b8;
      display: block;
      margin-top: 1px
    }

    .mx-pct {
      display: block;
      margin-top: 3px;
      font-size: 10px;
      font-weight: 700
    }

    .mx-pct.green {
      color: #16a34a
    }

    .mx-pct.amber {
      color: #d97706
    }

    .mx-pct.red {
      color: #dc2626
    }

    .mx-pct.muted {
      color: #cbd5e1
    }

    .mx-empty {
      padding: 16px;
      text-align: center;
      color: #94a3b8;
      font-size: 12px;
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: 10px
    }

    @media print {

      nav .nav-tabs,
      .week-toggle,
      .de-actions,
      .week-bar,
      #page-data {
        display: none
      }

      .page {
        display: block !important;
        padding: 20px
      }

      body {
        background: #fff
      }
    }
  </style>
</head>

<body>

  <nav>
    <img class="nav-logo" src="img-placeholder" alt="Vinayak Enterprises">
    <div class="nav-tabs" id="nav-tabs"></div>
    <div class="nav-right" id="nav-right"></div>
  </nav>

  <div id="pages"></div>

  <script>
    // ════════════════════════════════════════════════════════════
    //  DATA MODEL

    function num(v) { return (v === null || v === undefined || v === '') ? null : Number(v); }

    function score(plan, actual, dir) {
      const p = num(plan), a = num(actual);
      if (a === null) return { pct: null, color: 'muted', label: '—' };
      if (dir === 'zero') {
        if (a === 0) return { pct: 0, color: 'green', label: '0 ✓' };
        return { pct: null, color: (a <= 1 ? 'amber' : 'red'), label: a + (a === 1 ? ' issue' : ' issues') };
      }
      if (p === null || p === 0) return { pct: null, color: 'muted', label: '—' };
      let pct = dir === 'lower' ? ((p - a) / p) * 100 : ((a - p) / p) * 100;
      const r = Math.round(pct * 10) / 10;
      let color = r >= -1 ? 'green' : (r >= -10 ? 'amber' : 'red');
      const sign = r > 0 ? '+' : '';
      const tick = color === 'green' ? ' ✓' : '';
      return { pct: r, color, label: sign + r + '%' + tick };
    }

    function mtd(metric) {
      let plan = 0, act = 0, hasAct = false, hasPlan = false;
      MODEL.weeks.forEach(w => {

        const a = num(metric.actual[w.id]); if (a !== null) { act += a; hasAct = true; }
      });
      return { plan: hasPlan ? plan : null, actual: hasAct ? act : null };
    }

    // ── DATA ENTRY ──

                       <div class="de-cell head" style="text-align:center">Plan</div>

    <div class="de-actions">

    function renderAll() {
      buildNav();
      const pages = document.getElementById('pages');
      let html = `<div class="page" id="page-overview">${renderOverview()}</div>`;
      MODEL.departments.forEach(d => {
        html += `<div class="page" id="page-${d.id}">${renderDept(d)}</div>`;

    function showPage(id, btn) {
      activePage = id;
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ════════════════════════════════════════════════════════════
    //  DATA ENTRY ACTIONS
    // ════════════════════════════════════════════════════════════
    function slug(s) { return s.toLowerCase().replace(/[^a-z0-9]+/g, ''); }

    function setVal(deptId, metricId, field, value) {
      const d = MODEL.departments.find(x => x.id === deptId);
      const m = d.metrics.find(x => x.id === metricId);
      m[field][deActiveWeek] = (value === '' ? '' : Number(value));
      save();

      const sc = score(m.plan[deActiveWeek], m.actual[deActiveWeek], m.dir);
      const el = document.getElementById(`sc-${deptId}-${metricId}`);
      if (el) el.innerHTML = `<span class="score-pill ${sc.color}">${sc.label}</span>`;

      if (deptId === 'crm') {
        const p = m.plan[deActiveWeek], a = m.actual[deActiveWeek];
        const pend = (p !== '' && p != null && a !== '' && a != null) ? Math.max(0, p - a) : '—';
        const pEl = document.getElementById(`pend-${deptId}-${metricId}`);
        if (pEl) pEl.innerHTML = pend;
      }

      flashSaved();
    }

    function selWeek(id) { deActiveWeek = id; refreshDataPage(); }

    function requireEdit() {
      if (BACKEND_URL && !canEdit) { alert('You are in view mode. Click “Unlock Editing” first.'); return false; }
      return true;
    }

    function addWeek() {
      if (!requireEdit()) return;
      const n = MODEL.weeks.length + 1;
      let label = 'Week ' + n;
      let range = '';

      // ponytail: natively guess next 7 days based on last week's string
      if (MODEL.weeks.length > 0) {
        const last = MODEL.weeks[MODEL.weeks.length - 1].range;
        const parts = last.match(/(\d+)\s*([A-Za-z]*)\s*[^\d]+\s*(\d+)\s*([A-Za-z]+)/);
        if (parts) {
          const y = parseInt((MODEL.meta.period || '').match(/\d{4}/)?.[0] || new Date().getFullYear());
          let d = new Date(`${parts[4]} ${parts[3]}, ${y}`);
          d.setDate(d.getDate() + 1);
          const sDay = d.getDate(), sMon = d.toLocaleString('en', { month: 'short' });
          d.setDate(d.getDate() + 6);
          const eDay = d.getDate(), eMon = d.toLocaleString('en', { month: 'short' });
          range = sMon === eMon ? `${sDay}–${eDay} ${sMon}` : `${sDay} ${sMon}–${eDay} ${eMon}`;
        }
      }

      if (!range) {
        label = prompt('Week label:', label);
        if (label === null) return;
        range = prompt('Date range (e.g. 15–21 Jun):', '');
        if (range === null) return;
      }

      const id = 'w' + Date.now().toString(36);
      MODEL.weeks.push({ id, label, range });
      MODEL.departments.forEach(d => d.metrics.forEach(m => {
        m.plan[id] = '';
        m.actual[id] = '';
        if (m.promised) m.promised[id] = '';
        if (d.id === 'crm') { m.ontime = m.ontime || {}; m.ontime[id] = ''; }
      }));
      deActiveWeek = id;
      save(); renderAll(); showPage('data');
    }

    function delWeek(id) {
      if (!requireEdit()) return;
      if (MODEL.weeks.length <= 1) { alert('At least one week is required.'); return; }
      const w = MODEL.weeks.find(x => x.id === id);
      if (!confirm(`Remove ${w.label}? Its data will be deleted.`)) return;
      MODEL.weeks = MODEL.weeks.filter(x => x.id !== id);
      MODEL.departments.forEach(d => d.metrics.forEach(m => { delete m.plan[id]; delete m.actual[id]; }));
      if (deActiveWeek === id) deActiveWeek = MODEL.weeks[0].id;
      save(); renderAll(); showPage('data');
    }

    function refreshDataPage() {
      document.getElementById('page-data').innerHTML = renderDataEntry();
      setConn(CONN);
    }

    function resetAll() {
      if (!requireEdit()) return;
      if (!confirm('Reset ALL data back to the original June W1/W2 figures? This cannot be undone.')) return;
      MODEL = JSON.parse(JSON.stringify(SEED));
      deActiveWeek = MODEL.weeks[0].id;
      save(); renderAll(); showPage('data');
    }

    function exportData() {
      const blob = new Blob([JSON.stringify(MODEL, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `vinayak_kpi_${MODEL.meta.period.replace(/\s+/g, '_')}.json`;
      a.click(); URL.revokeObjectURL(url);
    }

    function importData() {
      const inp = document.createElement('input');
      inp.type = 'file'; inp.accept = '.json,application/json';
      inp.onchange = e => {
        const f = e.target.files[0]; if (!f) return;
        const r = new FileReader();
        r.onload = () => {
          try {
            const obj = JSON.parse(r.result);
            if (!obj.weeks || !obj.departments) throw new Error('bad file');
            MODEL = obj; deActiveWeek = MODEL.weeks[0]?.id || null;
            save(); renderAll(); showPage('data');
            alert('Imported successfully.');
          } catch (err) { alert('Could not import: invalid file.'); }
        };
        r.readAsText(f);
      };
      inp.click();
    }

    function addPosition(recruiter) {
      if (!requireEdit()) return;
      let name = prompt(`New position under ${recruiter}:`, '');
      if (name === null) return;
      name = name.trim(); if (!name) return;

      const hir = MODEL.departments.find(d => d.id === 'hiring');
      const baseId = `pos_${slug(recruiter)}_${slug(name)}`;
      if (hir.metrics.some(m => m.id === `${baseId}_apps`)) {
        alert(`That position already exists for ${recruiter}.`); return;
      }

      STAGES.forEach(st => {
        let m = {
          id: `${baseId}_${st[1]}`,
          name: `${name} — ${st[0]}`,
          sub: `Recruiter: ${recruiter} · Position: ${name} · ${st[0]}`,
          unit: '', dir: 'higher', total: false, plan: {}, actual: {}
        };
        MODEL.weeks.forEach(w => { m.plan[w.id] = ''; m.actual[w.id] = ''; });
        hir.metrics.push(m);
      });

      save(); pushToCloud();
      showPage('data'); refreshDataPage();
    }

    function removePosition(recruiter, name) {
      if (!requireEdit()) return;
      if (!confirm(`Remove position "${name}" under ${recruiter}? Its data will be deleted.`)) return;

      const hir = MODEL.departments.find(d => d.id === 'hiring');
      const baseId = `pos_${slug(recruiter)}_${slug(name)}`;
      hir.metrics = hir.metrics.filter(m => m.id.indexOf(`${baseId}_`) !== 0);

      save(); pushToCloud();
      showPage('data'); refreshDataPage();
    }

    let _saveTimer;
    function flashSaved() {
      const c = document.getElementById('save-confirm');
      if (!c) return;
      c.style.display = 'block';
      clearTimeout(_saveTimer);
      _saveTimer = setTimeout(() => c.style.display = 'none', 1500);
    }

    // ── BOOT ──
    window.addEventListener('DOMContentLoaded', () => {
      renderAll();
      if (BACKEND_URL) pullFromCloud();
      else setConn('offline');
    });
  </script>
</body>

</html>
